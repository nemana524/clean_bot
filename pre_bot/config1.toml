# =================================================================================
# CAPTCHA — SISTEMA DUAL-SERVICE COM PRIORIDADES
# =================================================================================
# Estratégia: Anti-Captcha (primário) + 2Captcha (secundário) em paralelo
# Quem responder primeiro ganha. CapMonster e CapSolver como fallback.
#
# Prioridade:
#   1. anti-captcha  (7 keys — melhor qualidade, usar em paralelo)
#   2. 2captcha      (2 keys — alternativa rápida)
#   3. capmonster    (2 keys — backup)
#   4. capsolver     (1 key  — último recurso, falha às vezes)

# Provider primário (usado no modo single-service)
captcha_solver_api = "anti-captcha"

# Modo dual-service: dispara 2 providers em paralelo e usa o mais rápido
captcha_dual_service = true
captcha_primary   = "anti-captcha"   # provider primário
captcha_secondary = "2captcha"       # provider secundário em paralelo

# Timeout por provider (segundos) — se ultrapassar, tenta o próximo
