# =================================================================================
# CAPTCHA — SISTEMA DUAL-SERVICE COM PRIORIDADES
# =================================================================================
captcha_solver_api = "anti-captcha"
captcha_dual_service = true
captcha_primary   = "anti-captcha"
captcha_secondary = "2captcha"
captcha_timeout_primary   = 90
captcha_timeout_secondary = 90
captcha_timeout_fallback  = 90
# true = no login, se Anti/2Captcha nao resolverem dentro do orcamento
# seguro, NAO cai para CapMonster/CapSolver. Abortamos antes do POST /login
# para preservar as tentativas restantes do contador ReCaptcha do MNE.
captcha_skip_backup_providers_on_login = false
# true = when login backup providers are enabled, start them in the same race
# instead of waiting until Anti-Captcha has consumed the whole safe token budget.
captcha_parallel_backups_on_login = true
# SOAX superproxy edges are reachable by the browser, but Anti-Captcha/2Captcha/
# CapSolver workers have repeatedly returned ERROR_PROXY_CONNECT_REFUSED against
# the resolved edge IPs. Keep them out of login races when CapMonster is present.
captcha_skip_soax_custom_proxy_solvers_on_login = true
# Se true no login SOAX: tentar primeiro CapMonster com proxyAddress igual ao browser antes do proxyless
# (melhor alinhamento IP token↔POST /login). Se createTask/connect falhar, cai para proxyless.
captcha_soax_try_capmonster_proxy_match_first = true
# Fase 0a: evitar timeout prematuro quando CapMonster demora (~40–55s); reduz fallback 0b e avisos «sem tempo restante».
captcha_soax_capmonster_proxy_attempt_timeout_sec = 50
# Se o ipify pré-sessão reportou egress IPv4, tentar esse IP como gateway proxy no solver
# antes do primeiro A-record DNS do host SOAX (fila Fase 0a → Fase 0b).
captcha_soax_try_validator_egress_as_proxy_gateway = true

# Polling do resultado CAPTCHA (antes: 3s fixo; mais baixo = resposta mais rápida quando pronto)
captcha_poll_interval_sec = 1.5
captcha_max_poll_iterations = 60

# Idade MÁXIMA do token reCAPTCHA antes de submetermos o POST /login.
# A Google só aceita tokens até 120s; subtraímos margem para o POST + verify
# do lado do MNE. Se o solver demorar mais que isto, abortamos a submissão
# (não gastamos POST /login com um token DOA que devolveria
# "Foi encontrado um erro ao executar a operação." e penalizaria o proxy
# como se fosse um servidor a rejeitar).
captcha_max_token_age_seconds = 100

# Resolver CAPTCHA durante a navegação à Authentication.jsp — token efectivamente mais recente ao clicar.
captcha_prewarm_on_login_navigation = true
# true = after token injection, wait until browser/page state shows CAPTCHA
# completed before clicking login. Prevents clicking before the visible checkmark/state.
captcha_require_visual_checkmark_before_submit = true

